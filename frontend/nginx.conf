server {
    listen 80;

    # Arquivos estáticos do build do Vite
    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida cai no index.html (React Router cuida do resto)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso: chamadas a /api são repassadas ao container do backend.
    # Assim front e API ficam na mesma origem e não há problema de CORS.
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
